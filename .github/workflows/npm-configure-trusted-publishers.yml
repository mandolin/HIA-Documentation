name: npm Configure Trusted Publishers

on:
  workflow_dispatch:
    inputs:
      confirm_configuration:
        description: "Type: configure 13 @hia-doc trusted publishers"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-trusted-publisher-configuration-0.1.0
  cancel-in-progress: false

jobs:
  configure:
    name: Configure 13 GitHub Actions trusted publishers
    if: inputs.confirm_configuration == 'configure 13 @hia-doc trusted publishers'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Install npm Trusted Publishing baseline
        run: npm install -g npm@11.18.0

      - name: Verify temporary bootstrap credential exists
        env:
          HIA_NPM_BOOTSTRAP_TOKEN: ${{ secrets.HIA_NPM_BOOTSTRAP_TOKEN }}
        run: test -n "$HIA_NPM_BOOTSTRAP_TOKEN"

      - name: Configure GitHub Actions trusted publishers
        env:
          NODE_AUTH_TOKEN: ${{ secrets.HIA_NPM_BOOTSTRAP_TOKEN }}
        run: node scripts/configure-npm-trusted-publishers.mjs --execute
